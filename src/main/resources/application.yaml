server:
  port: 8080

spring:
  application:
    name: AssetFlow

  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://localhost:5432/${DB_NAME}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    database: postgresql

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 900000 # 15 minutes
      refresh-token:
        expiration: 604800000 # 7 days
      cookie:
        path: /
        secure: false
        same-site: Lax
